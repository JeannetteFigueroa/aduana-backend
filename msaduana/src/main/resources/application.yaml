server:
  port: 8084

spring:
  application:
    name: msaduana
  datasource:
    url: jdbc:mysql://localhost:3307/db_aduana?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info