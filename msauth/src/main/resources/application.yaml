server:
  port: 8081

spring:
  application:
    name: ms-auth

  datasource:
    url: jdbc:mysql://localhost:3307/db_auth?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: miSecretKeyParaJwtQueDebeTenerAlMenos256BitsDeLongitud
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
