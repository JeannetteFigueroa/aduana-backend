server:
  port: 8080

spring:
  application:
    name: apigateway

  cloud:
    gateway:
      routes:
        - id: ms-auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: ms-usuarios
          uri: http://localhost:8082
          predicates:
            - Path=/api/usuarios/**

        - id: ms-viajeros
          uri: http://localhost:8083
          predicates:
            - Path=/api/viajeros/**

        - id: ms-aduana
          uri: http://localhost:8084
          predicates:
            - Path=/api/vehiculos/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "https://aduana-frontend-wheat.vercel.app"
              - "https://literature-ran-classified-deemed.trycloudflare.com"
              - "http://localhost:5173"
              - "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
