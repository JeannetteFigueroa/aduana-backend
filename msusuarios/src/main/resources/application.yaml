server:
  port: ${PORT:8082}

spring:
  application:
    name: ms-usuarios

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/db_usuarios?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
